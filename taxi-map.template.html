<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Taxi GPS Tracker Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1419; --surface: #1a2332; --surface2: #243044; --border: #2d3a4f;
      --text: #e8edf4; --muted: #8b9cb3; --accent: #3b82f6; --route: #2563eb;
      --parked: #8b5cf6; --idle: #f59e0b; --start: #22c55e; --end: #ef4444; --drive: #06b6d4; --vocal: #ec4899;
      --header-h: 52px; --panel-w: 360px;
    }
    html, body { height: 100%; font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }
    #app { display: none; flex-direction: column; height: 100%; }
    #app.ready { display: flex; }
    #map-loading {
      position: absolute; inset: 0; z-index: 700; display: grid; place-items: center;
      background: rgba(15,20,25,.55); pointer-events: none; transition: opacity .3s;
    }
    #map-loading.hidden { opacity: 0; }
    #map-loading span {
      background: var(--surface); border: 1px solid var(--border); padding: 10px 16px;
      border-radius: 8px; font-size: 13px; color: var(--muted);
    }
    .leaflet-tile-loaded { transition: opacity .15s linear; }
    header {
      height: var(--header-h); min-height: var(--header-h); display: flex; align-items: center; gap: 8px;
      padding: 0 10px; background: var(--surface); border-bottom: 1px solid var(--border); z-index: 1000; flex-shrink: 0;
    }
    header h1 { font-size: 14px; font-weight: 700; white-space: nowrap; }
    header .badge { font-size: 10px; color: var(--muted); background: var(--surface2); padding: 3px 7px; border-radius: 999px; white-space: nowrap; }
    .header-stats { display: flex; gap: 5px; overflow-x: auto; flex: 1; scrollbar-width: none; }
    .header-stats::-webkit-scrollbar { display: none; }
    .stat-chip { font-size: 10px; padding: 3px 7px; border-radius: 6px; background: var(--surface2); white-space: nowrap; border: 1px solid var(--border); }
    .stat-chip strong { color: var(--accent); }
    .icon-btn {
      width: 34px; height: 34px; border: 1px solid var(--border); background: var(--surface2); color: var(--text);
      border-radius: 8px; cursor: pointer; display: grid; place-items: center; flex-shrink: 0; font-size: 14px;
    }
    .icon-btn:hover { background: var(--border); }
    .icon-btn.active { background: var(--accent); border-color: var(--accent); }
    .lang-switch {
      display: flex; border: 2px solid var(--accent); border-radius: 10px; overflow: hidden; flex-shrink: 0;
      box-shadow: 0 0 0 2px rgba(59,130,246,.25);
    }
    .lang-switch button {
      padding: 6px 12px; border: none; background: var(--surface2); color: var(--muted);
      font-size: 13px; font-weight: 700; cursor: pointer; min-width: 44px;
    }
    .lang-switch button.active { background: var(--accent); color: #fff; }
    body.rtl { direction: rtl; }
    body.rtl header { flex-direction: row-reverse; }
    body.rtl #panel { border-left: none; border-right: 1px solid var(--border); }
    body.rtl .list-item .duration { margin-left: 0; margin-right: auto; }
    body.rtl .play-btns { margin-left: 0; margin-right: auto; }
    @media (max-width: 768px) {
      body.rtl #panel { right: auto; left: 0; transform: translateX(-100%); }
      body.rtl #panel.open { transform: translateX(0); }
    }
    #main { display: flex; flex: 1; min-height: 0; position: relative; }
    #map-wrap { flex: 1; min-width: 0; position: relative; min-height: 0; }
    #map { position: absolute; inset: 0; background: #1a1a2e; }
    #panel {
      width: var(--panel-w); background: var(--surface); border-left: 1px solid var(--border);
      display: flex; flex-direction: column; min-height: 0; transition: transform .25s ease;
    }
    .panel-tabs { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; overflow-x: auto; scrollbar-width: none; }
    .panel-tabs::-webkit-scrollbar { display: none; }
    .panel-tabs button {
      flex: 1; min-width: 58px; padding: 9px 4px; border: none; background: transparent; color: var(--muted);
      font-size: 11px; font-weight: 600; cursor: pointer; border-bottom: 2px solid transparent;
    }
    .panel-tabs button.active { color: var(--text); border-bottom-color: var(--accent); }
    .panel-body { flex: 1; overflow-y: auto; min-height: 0; -webkit-overflow-scrolling: touch; }
    .panel-section { padding: 12px; display: none; }
    .panel-section.active { display: block; }
    .interval-box { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 12px; margin-bottom: 12px; }
    .interval-box h3 { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 10px; }
    .time-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
    .time-fields label { display: flex; flex-direction: column; gap: 4px; font-size: 11px; color: var(--muted); }
    .time-fields input {
      padding: 10px 8px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg);
      color: var(--text); font-size: 14px; width: 100%;
    }
    .preset-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 10px; }
    .preset-btn {
      padding: 8px 6px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg);
      color: var(--text); font-size: 11px; cursor: pointer; text-align: center;
    }
    .preset-btn:hover, .preset-btn.active { background: var(--accent); border-color: var(--accent); }
    .interval-actions { display: flex; gap: 8px; }
    .interval-actions button {
      flex: 1; padding: 10px; border-radius: 8px; border: none; font-size: 13px; font-weight: 600; cursor: pointer;
    }
    #apply-interval { background: var(--accent); color: #fff; }
    #reset-interval { background: var(--surface); color: var(--text); border: 1px solid var(--border) !important; }
    .interval-info { margin-top: 10px; font-size: 11px; color: var(--muted); line-height: 1.5; }
    .interval-info strong { color: var(--text); }
    .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .summary-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 10px; }
    .summary-card .label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
    .summary-card .value { font-size: 15px; font-weight: 700; margin-top: 4px; }
    .legend { margin-top: 14px; display: flex; flex-direction: column; gap: 6px; }
    .legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted); }
    .legend-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
    .toggles { margin-top: 14px; display: flex; flex-direction: column; gap: 8px; }
    .toggle-row { display: flex; align-items: center; justify-content: space-between; font-size: 13px; }
    .toggle-row input { width: 18px; height: 18px; accent-color: var(--accent); cursor: pointer; }
    .list-item { padding: 10px 12px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background .15s; }
    .list-item:hover, .list-item.highlight { background: var(--surface2); }
    .list-item .row1 { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .list-item .tag { font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; }
    .tag.parked { background: rgba(139,92,246,.2); color: #c4b5fd; }
    .tag.idle { background: rgba(245,158,11,.2); color: #fcd34d; }
    .tag.drive { background: rgba(6,182,212,.2); color: #67e8f9; }
    .tag.vocal { background: rgba(236,72,153,.2); color: #f9a8d4; }
    .list-item .duration { font-size: 14px; font-weight: 700; margin-left: auto; }
    .list-item .times { font-size: 11px; color: var(--muted); line-height: 1.5; }
    .list-item .coords { font-size: 10px; color: var(--muted); font-family: ui-monospace, monospace; margin-top: 2px; }
    #timeline-bar {
      position: absolute; left: 0; right: 0; bottom: 0; z-index: 800; background: rgba(26,35,50,.95);
      backdrop-filter: blur(8px); border-top: 1px solid var(--border); padding: 10px 12px 14px; transition: transform .25s ease;
    }
    #timeline-bar.hidden { transform: translateY(100%); }
    .timeline-top { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
    .timeline-top .time-display { font-size: 12px; font-weight: 600; }
    .timeline-top .speed-display { font-size: 11px; color: var(--muted); }
    .timeline-top .play-btns { display: flex; gap: 6px; margin-left: auto; }
    .play-btns button { padding: 6px 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-size: 11px; cursor: pointer; }
    .play-btns button.primary { background: var(--accent); border-color: var(--accent); }
    #time-slider { width: 100%; accent-color: var(--accent); cursor: pointer; }
    #err-screen {
      position: fixed; inset: 0; z-index: 9999; background: var(--bg); display: none;
      flex-direction: column; align-items: center; justify-content: center; gap: 12px; padding: 24px; text-align: center;
    }
    #err-screen.show { display: flex; }
    #gate-screen {
      position: fixed; inset: 0; z-index: 10000; background: var(--bg);
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; padding: 24px;
    }
    #gate-screen.hidden { display: none; }
    #gate-screen h2 { font-size: 22px; }
    #gate-screen p { color: var(--muted); font-size: 14px; }
    #gate-pass {
      padding: 12px 16px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface);
      color: var(--text); font-size: 16px; width: min(280px, 100%); text-align: center;
    }
    #gate-enter {
      padding: 12px 32px; border-radius: 10px; border: none; background: var(--accent);
      color: #fff; font-size: 15px; font-weight: 600; cursor: pointer;
    }
    #gate-error { color: #f87171; font-size: 13px; min-height: 18px; }
    .leaflet-popup-content-wrapper { border-radius: 10px; }
    .popup-title { font-weight: 700; margin-bottom: 6px; font-size: 14px; }
    .popup-row { font-size: 12px; line-height: 1.6; color: #334155; }
    .popup-row strong { color: #0f172a; }
    .stop-marker, .endpoint-marker { background: none !important; border: none !important; }
    .stop-pin {
      width: 28px; height: 28px; border-radius: 50% 50% 50% 0; transform: rotate(-45deg);
      border: 2px solid #fff; box-shadow: 0 2px 8px rgba(0,0,0,.35); display: grid; place-items: center;
    }
    .stop-pin span { transform: rotate(45deg); font-size: 11px; font-weight: 800; color: #fff; }
    .stop-pin.parked { background: var(--parked); }
    .stop-pin.idle { background: var(--idle); }
    .endpoint { width: 32px; height: 32px; border-radius: 50%; border: 3px solid #fff; box-shadow: 0 2px 10px rgba(0,0,0,.4); display: grid; place-items: center; font-size: 14px; font-weight: 800; color: #fff; }
    .endpoint.start { background: var(--start); }
    .endpoint.end { background: var(--end); }
    .position-dot { width: 16px; height: 16px; border-radius: 50%; background: var(--accent); border: 3px solid #fff; box-shadow: 0 0 0 4px rgba(59,130,246,.35); }
    .vocal-marker { background: none !important; border: none !important; }
    .vocal-pin {
      width: 30px; height: 30px; border-radius: 50%; background: var(--vocal); border: 2px solid #fff;
      box-shadow: 0 2px 10px rgba(236,72,153,.5); display: grid; place-items: center; font-size: 14px;
    }
    .list-item .play-vocal {
      margin-top: 8px; padding: 6px 10px; border-radius: 6px; border: 1px solid var(--border);
      background: var(--surface2); color: var(--text); font-size: 11px; cursor: pointer; width: 100%;
    }
    .list-item audio, .popup-audio { width: 100%; margin-top: 8px; height: 32px; }
    .mobile-stats { display: none; position: absolute; top: 8px; left: 8px; z-index: 800; flex-direction: column; gap: 4px; pointer-events: none; max-width: calc(100% - 60px); }
    .mobile-stats .stat-chip { font-size: 10px; padding: 3px 6px; background: rgba(26,35,50,.92); backdrop-filter: blur(4px); }
    .panel-overlay { display: none; position: absolute; inset: 0; background: rgba(0,0,0,.45); z-index: 850; }
    @media (max-width: 768px) {
      :root { --panel-w: 100%; }
      #panel { position: absolute; right: 0; top: 0; bottom: 0; width: min(100%, 340px); z-index: 900; box-shadow: -4px 0 24px rgba(0,0,0,.4); transform: translateX(100%); }
      #panel.open { transform: translateX(0); }
      .panel-overlay.visible { display: block; }
      #timeline-bar { padding-bottom: max(14px, env(safe-area-inset-bottom)); }
      header h1 { font-size: 12px; }
      .header-stats { display: none; }
      .mobile-stats { display: flex !important; }
    }
  </style>
</head>
<body>
  <div id="gate-screen">
    <div class="lang-switch" id="gate-lang-switch" style="margin-bottom:8px">
      <button type="button" id="gate-lang-fr" class="active">FR</button>
      <button type="button" id="gate-lang-ar">عربي</button>
    </div>
    <h2 data-i18n="gateTitle">Carte Taxi 487</h2>
    <p data-i18n="gateSubtitle">Entrez le mot de passe pour voir la trajectoire</p>
    <input type="password" id="gate-pass" data-i18n-placeholder="gatePlaceholder" placeholder="Mot de passe" autocomplete="off">
    <button id="gate-enter" data-i18n="gateEnter">Entrer</button>
    <p id="gate-error"></p>
  </div>

  <div id="err-screen"><h2 data-i18n="errTitle">Données indisponibles</h2><p data-i18n="errMsg">Rechargez la page. Toutes les données sont intégrées dans la page.</p></div>

  <div id="app">
    <header>
      <div class="lang-switch" id="lang-switch">
        <button type="button" id="lang-fr" class="active">FR</button>
        <button type="button" id="lang-ar">عربي</button>
      </div>
      <button class="icon-btn" id="panel-toggle" title="Menu">☰</button>
      <h1 id="vehicle-name">Taxi</h1>
      <span class="badge" id="trip-date"></span>
      <div class="header-stats" id="header-stats"></div>
      <button class="icon-btn" id="timeline-toggle" title="Chronologie">⏱</button>
      <button class="icon-btn" id="fit-btn" title="Centrer">⌖</button>
    </header>
    <div id="main">
      <div id="map-wrap">
        <div id="map"></div>
        <div id="map-loading"><span data-i18n="loading">Chargement…</span></div>
      </div>
      <div class="mobile-stats" id="mobile-stats"></div>
      <div class="panel-overlay" id="panel-overlay"></div>
      <aside id="panel">
        <div class="panel-tabs">
          <button class="active" data-tab="time" data-i18n="tabTime">Heure</button>
          <button data-tab="stops" data-i18n="tabStops">Arrêts</button>
          <button data-tab="drives" data-i18n="tabDrives">Trajets</button>
          <button data-tab="vocales" data-i18n="tabVocales">Vocales</button>
          <button data-tab="summary" data-i18n="tabInfo">Infos</button>
        </div>
        <div class="panel-body">
          <div class="panel-section active" id="tab-time">
            <div class="interval-box">
              <h3 data-i18n="intervalTitle">Plage horaire</h3>
              <div class="time-fields">
                <label><span data-i18n="from">De</span><input type="time" id="interval-from" step="60"></label>
                <label><span data-i18n="to">À</span><input type="time" id="interval-to" step="60"></label>
              </div>
              <div class="preset-grid" id="preset-grid"></div>
              <div class="interval-actions">
                <button id="apply-interval" data-i18n="apply">Appliquer</button>
                <button id="reset-interval" data-i18n="fullTrip">Journée complète</button>
              </div>
              <div class="interval-info" id="interval-info"></div>
            </div>
          </div>
          <div class="panel-section" id="tab-stops"></div>
          <div class="panel-section" id="tab-drives"></div>
          <div class="panel-section" id="tab-vocales"></div>
          <div class="panel-section" id="tab-summary"></div>
        </div>
      </aside>
    </div>
    <div id="timeline-bar">
      <div class="timeline-top">
        <span class="time-display" id="time-display">—</span>
        <span class="speed-display" id="speed-display"></span>
        <div class="play-btns">
          <button id="play-btn" class="primary" data-i18n="play">▶ Lire</button>
          <button id="pause-btn" data-i18n="pause">⏸ Pause</button>
        </div>
      </div>
      <input type="range" id="time-slider" min="0" max="0" value="0">
    </div>
  </div>

  <script type="application/json" id="taxi-data">/*__TAXI_DATA__*/{}</script>
  <script type="application/json" id="vocales-data">/*__VOCALES_DATA__*/[]</script>
  <script>
    window.__TAXI_DATA__ = JSON.parse(document.getElementById('taxi-data').textContent);
    window.__VOCALES_DATA__ = JSON.parse(document.getElementById('vocales-data').textContent);
  </script>

        toggleRoute: 'خط المسار', toggleStops: 'علامات التوقف', toggleParkedOnly: 'المركون فقط',
        toggleDrives: 'قطاعات الرحلة', toggleVocales: 'علامات التسجيل',
        popupParked: 'مركون', popupStopped: 'توقف', popupDuration: 'المدة', popupFrom: 'من', popupTo: 'إلى',
        popupIgnition: 'المحرك', popupOff: 'مطفأ', popupOn: 'شغال',
        popupDrive: 'رحلة', popupDistance: 'المسافة', popupTopSpeed: 'السرعة القصوى',
        popupTime: 'الوقت', popupSpeed: 'السرعة', popupIgnitionShort: 'المحرك',
        popupVocal: 'تسجيل', popupRecorded: 'مسجل', popupLength: 'المدة',
        popupCarAt: 'التاكسي عند', popupIntervalStart: 'بداية الفترة', popupIntervalEnd: 'نهاية الفترة',
        ignitionOn: 'شغال', ignitionOff: 'مطفأ'
      }
    };

    let lang = localStorage.getItem(LANG_KEY) || 'fr';
    function t(k) { return (I18N[lang] && I18N[lang][k]) || I18N.fr[k] || k; }

    function setLang(l) {
      lang = l;
      localStorage.setItem(LANG_KEY, l);
      document.documentElement.lang = l === 'ar' ? 'ar' : 'fr';
      document.body.classList.toggle('rtl', l === 'ar');
      ['lang-fr', 'lang-ar', 'gate-lang-fr', 'gate-lang-ar'].forEach(id => {
        const el = $(id);
        if (el) el.classList.toggle('active', id.endsWith(l));
      });
      document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = t(el.dataset.i18n); });
      document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
        el.placeholder = t(el.dataset.i18nPlaceholder);
      });
      if (rawData) {
        buildPresets();
        if (viewData) { renderMap(); }
      }
    }

    function bindLangButtons() {
      ['lang-fr', 'gate-lang-fr'].forEach(id => { const el = $(id); if (el) el.onclick = () => setLang('fr'); });
      ['lang-ar', 'gate-lang-ar'].forEach(id => { const el = $(id); if (el) el.onclick = () => setLang('ar'); });
      setLang(lang);
    }

    let rawData, viewData, map, layers = {}, positionMarker, playTimer = null, currentIndex = 0;
    let mapReady = false;
    let tripBounds = { minMs: 0, maxMs: 0 }, filterStartMs = 0, filterEndMs = 0;
    let uiBound = false, toggleState = { route: true, stops: true, drives: false, parkedOnly: false, vocales: true };
    let allVocales = [], viewVocales = [], activeAudio = null;

    const $ = id => document.getElementById(id);

    function parseDate(s) { return new Date(String(s).replace(' ', 'T')); }
    function isParked(s) { return s.params && s.params.acc === '0'; }
    function overlaps(startMs, endMs, aStart, aEnd) { return aStart <= endMs && aEnd >= startMs; }

    function timeToInput(ms) {
      const d = new Date(ms);
      return String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
    }

    function inputToMs(timeStr, dayAnchor) {
      const [h, m] = timeStr.split(':').map(Number);
      const d = new Date(dayAnchor);
      d.setHours(h, m, 0, 0);
      return d.getTime();
    }

    function formatDuration(sec) {
      if (sec < 60) return sec + ' S';
      const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60), s = sec % 60;
      if (h) return `${h} H ${m} Min ${s} S`;
      return `${m} Min ${s} S`;
    }

    function parseDuration(str) {
      if (!str) return 0;
      let sec = 0;
      const h = str.match(/(\d+)\s*H/i); if (h) sec += +h[1] * 3600;
      const m = str.match(/(\d+)\s*Min/i); if (m) sec += +m[1] * 60;
      const s = str.match(/(\d+)\s*S/i); if (s) sec += +s[1];
      return sec;
    }

    function haversineKm(a, b) {
      const R = 6371, toR = x => x * Math.PI / 180;
      const dLat = toR(+b.lat - +a.lat), dLng = toR(+b.lng - +a.lng);
      const lat1 = toR(+a.lat), lat2 = toR(+b.lat);
      const h = Math.sin(dLat/2)**2 + Math.cos(lat1)*Math.cos(lat2)*Math.sin(dLng/2)**2;
      return 2 * R * Math.asin(Math.sqrt(h));
    }

    function findPositionAtTime(fullRoute, ms) {
      if (!fullRoute?.length) return null;
      let best = fullRoute[0], bestDiff = Math.abs(parseDate(best.dt_tracker).getTime() - ms);
      for (const p of fullRoute) {
        const d = Math.abs(parseDate(p.dt_tracker).getTime() - ms);
        if (d < bestDiff) { best = p; bestDiff = d; }
      }
      return best;
    }

    function enrichVocales(manifest, fullRoute) {
      return (manifest || []).map((v, i) => {
        const ms = parseDate(v.datetime).getTime();
        const pt = findPositionAtTime(fullRoute, ms);
        return {
          ...v, id: i, ms,
          lat: pt ? +pt.lat : null,
          lng: pt ? +pt.lng : null,
          speed: pt ? pt.speed : null,
          gpsTime: pt ? pt.dt_tracker : null
        };
      });
    }

    function filterVocales(vocales, startMs, endMs) {
      return vocales.filter(v => v.ms >= startMs && v.ms <= endMs);
    }

    function stopActiveAudio() {
      if (activeAudio) { activeAudio.pause(); activeAudio = null; }
    }

    function playVocal(v) {
      stopActiveAudio();
      activeAudio = new Audio(v.file);
      activeAudio.play().catch(() => {});
    }

    function vocalPopup(v) {
      return `<div class="popup-title">${t('popupVocal')} ${v.label}</div>
        <div class="popup-row"><strong>${t('popupRecorded')}:</strong> ${v.datetime.slice(11, 16)}</div>
        <div class="popup-row"><strong>${t('popupLength')}:</strong> ${v.durationLabel}</div>
        ${v.gpsTime ? `<div class="popup-row"><strong>${t('popupCarAt')}:</strong> ${v.gpsTime} (${v.speed} km/h)</div>` : ''}
        <audio class="popup-audio" controls preload="none" src="${v.file}"></audio>`;
    }

    function makeVocalIcon() {
      return L.divIcon({
        className: 'vocal-marker',
        html: '<div class="vocal-pin">🎙</div>',
        iconSize: [30, 30], iconAnchor: [15, 15], popupAnchor: [0, -15]
      });
    }

    function filterData(raw, startMs, endMs) {
      const fullRoute = raw.route || [];
      const route = fullRoute.filter(p => {
        const t = parseDate(p.dt_tracker).getTime();
        return t >= startMs && t <= endMs;
      });
      const stops = (raw.stops || []).filter(s =>
        overlaps(startMs, endMs, parseDate(s.dt_start).getTime(), parseDate(s.dt_end).getTime())
      );
      const drives = (raw.drives || []).filter(d =>
        overlaps(startMs, endMs, parseDate(d.dt_start).getTime(), parseDate(d.dt_end).getTime())
      );

      let dist = 0;
      for (let i = 1; i < route.length; i++) dist += haversineKm(route[i-1], route[i]);
      const topSpeed = route.reduce((m, p) => Math.max(m, +p.speed || 0), 0);
      const stopSec = stops.reduce((s, x) => s + parseDuration(x.duration), 0);
      const driveSec = drives.reduce((s, x) => s + parseDuration(x.duration), 0);
      const driveDist = drives.reduce((s, x) => s + (+x.route_length || 0), 0);

      return {
        ...raw, route, stops, drives, _fullRoute: fullRoute,
        _stats: {
          distance: Math.round((driveDist || dist) * 100) / 100,
          topSpeed, stopSec, driveSec,
          parked: stops.filter(isParked).length
        }
      };
    }

    function stopPopup(stop, i) {
      const p = isParked(stop);
      return `<div class="popup-title">${p ? '🅿️ ' + t('popupParked') : '⏸ ' + t('popupStopped')} #${i+1}</div>
        <div class="popup-row"><strong>${t('popupDuration')}:</strong> ${stop.duration}</div>
        <div class="popup-row"><strong>${t('popupFrom')}:</strong> ${stop.dt_start}</div>
        <div class="popup-row"><strong>${t('popupTo')}:</strong> ${stop.dt_end}</div>
        <div class="popup-row"><strong>${t('popupIgnition')}:</strong> ${p ? t('popupOff') : t('popupOn')}</div>`;
    }

    function drivePopup(d, i) {
      return `<div class="popup-title">🚗 ${t('popupDrive')} #${i+1}</div>
        <div class="popup-row"><strong>${t('popupDuration')}:</strong> ${d.duration}</div>
        <div class="popup-row"><strong>${d.dt_start}</strong> → ${d.dt_end}</div>
        <div class="popup-row"><strong>${t('popupDistance')}:</strong> ${d.route_length} km · ${t('popupTopSpeed')} ${d.top_speed} km/h</div>`;
    }

    function pointPopup(p) {
      const ign = p.params?.acc === '1' ? t('ignitionOn') : t('ignitionOff');
      return `<div class="popup-row"><strong>${t('popupTime')}:</strong> ${p.dt_tracker}</div>
        <div class="popup-row"><strong>${t('popupSpeed')}:</strong> ${p.speed} km/h · ${t('popupIgnitionShort')} ${ign}</div>`;
    }

    function makeStopIcon(stop, i) {
      const cls = isParked(stop) ? 'parked' : 'idle';
      return L.divIcon({
        className: 'stop-marker',
        html: `<div class="stop-pin ${cls}"><span>${i+1}</span></div>`,
        iconSize: [28,28], iconAnchor: [14,28], popupAnchor: [0,-28]
      });
    }

    function makeTiles(url, opts) {
      return L.tileLayer(url, {
        maxZoom: 19, maxNativeZoom: 19, keepBuffer: 8, updateWhenIdle: false,
        updateWhenZooming: true, detectRetina: true, crossOrigin: true, ...opts
      });
    }

    function initMap() {
      if (mapReady) return;
      mapReady = true;
      map = L.map('map', { zoomControl: true, fadeAnimation: true, zoomAnimationThreshold: 6 })
        .setView([35.674, 10.087], 13);

      const carto = makeTiles('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
        subdomains: 'abcd', attribution: '&copy; OSM &copy; CARTO'
      });
      const osm = makeTiles('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        subdomains: 'abc', attribution: '&copy; OpenStreetMap'
      });
      carto.addTo(map);
      let switched = false;
      carto.on('tileerror', () => {
        if (switched) return;
        switched = true;
        map.removeLayer(carto);
        osm.addTo(map);
      });

      layers.route = L.layerGroup().addTo(map);
      layers.stops = L.layerGroup().addTo(map);
      layers.drives = L.layerGroup();
      layers.vocales = L.layerGroup().addTo(map);
      layers.position = L.layerGroup().addTo(map);
      positionMarker = L.marker([0,0], {
        icon: L.divIcon({ className: '', html: '<div class="position-dot"></div>', iconSize: [16,16], iconAnchor: [8,8] })
      });

      requestAnimationFrame(() => map.invalidateSize());
    }

    function renderMap() {
      pausePlay();
      layers.route.clearLayers(); layers.stops.clearLayers(); layers.drives.clearLayers();
      layers.vocales.clearLayers(); layers.position.clearLayers();

      viewVocales = filterVocales(allVocales, filterStartMs, filterEndMs);

      const route = viewData.route || [];
      const stops = viewData.stops || [];
      const drives = viewData.drives || [];
      const fullRoute = viewData._fullRoute || route;
      const latlngs = route.map(p => [+p.lat, +p.lng]);

      if (latlngs.length) {
        if (toggleState.route) {
          L.polyline(latlngs, { color: '#2563eb', weight: 4, opacity: 0.85 }).addTo(layers.route);
          const start = route[0], end = route[route.length - 1];
          L.marker([+start.lat, +start.lng], {
            icon: L.divIcon({ className: 'endpoint-marker', html: '<div class="endpoint start">S</div>', iconSize: [32,32], iconAnchor: [16,16] })
          }).bindPopup(`<div class="popup-title">${t('popupIntervalStart')}</div><div class="popup-row">${start.dt_tracker}</div>`).addTo(layers.route);
          L.marker([+end.lat, +end.lng], {
            icon: L.divIcon({ className: 'endpoint-marker', html: '<div class="endpoint end">E</div>', iconSize: [32,32], iconAnchor: [16,16] })
          }).bindPopup(`<div class="popup-title">${t('popupIntervalEnd')}</div><div class="popup-row">${end.dt_tracker}</div>`).addTo(layers.route);
        }
      }

      if (toggleState.stops) {
        stops.forEach((stop, i) => {
          if (toggleState.parkedOnly && !isParked(stop)) return;
          const m = L.marker([+stop.lat, +stop.lng], { icon: makeStopIcon(stop, i) }).bindPopup(stopPopup(stop, i));
          m._stopIndex = i; m.addTo(layers.stops);
        });
      }

      if (toggleState.drives) {
        drives.forEach((drive, i) => {
          const seg = fullRoute.slice(drive.id_start, (drive.id_end || 0) + 1).filter(p => {
            const t = parseDate(p.dt_tracker).getTime();
            return t >= filterStartMs && t <= filterEndMs;
          });
          if (seg.length < 2) return;
          L.polyline(seg.map(p => [+p.lat, +p.lng]), { color: '#06b6d4', weight: 5, opacity: 0.7 })
            .bindPopup(drivePopup(drive, i)).addTo(layers.drives);
        });
        map.addLayer(layers.drives);
      } else {
        map.removeLayer(layers.drives);
      }

      if (toggleState.vocales) {
        viewVocales.forEach((v, i) => {
          if (v.lat == null) return;
          const m = L.marker([v.lat, v.lng], { icon: makeVocalIcon() }).bindPopup(vocalPopup(v));
          m._vocalIndex = i;
          m.on('popupopen', () => stopActiveAudio());
          m.addTo(layers.vocales);
        });
      }

      if (latlngs.length) {
        requestAnimationFrame(() => {
          map.fitBounds(L.latLngBounds(latlngs), { padding: [40, 40], animate: false, maxZoom: 16 });
          setTimeout(() => map.invalidateSize({ pan: false }), 150);
        });
      }
      setupTimeline(route);
      renderLists();
      renderStats();
    }

    function renderStats() {
      const route = viewData.route || [];
      const stops = viewData.stops || [];
      const st = viewData._stats || {};
      const parked = st.parked ?? stops.filter(isParked).length;
      const fromT = timeToInput(filterStartMs), toT = timeToInput(filterEndMs);
      const isFull = filterStartMs <= tripBounds.minMs && filterEndMs >= tripBounds.maxMs;

      $('trip-date').textContent = isFull
        ? (route[0]?.dt_tracker?.slice(0, 10) || '')
        : `${fromT}–${toT}`;

      const chips = [
        [`${st.distance ?? '—'} km`, t('statDistance')],
        [`${st.topSpeed ?? '—'} km/h`, t('statTop')],
        [`${stops.length} (${parked} ${t('statParked')})`, t('statStops')],
        [`${viewVocales.length}`, t('statVocales')],
        [formatDuration(st.stopSec || 0), t('statStopped')],
        [formatDuration(st.driveSec || 0), t('statDriving')]
      ];
      const html = chips.map(([v, k]) => `<span class="stat-chip"><strong>${v}</strong> ${k}</span>`).join('');
      $('header-stats').innerHTML = html;
      $('mobile-stats').innerHTML = html;

      $('interval-info').innerHTML = isFull
        ? `<strong>${t('fullTripInfo')}</strong> · ${route.length} ${t('gpsPoints')} · ${stops.length} ${t('stopsWord')} · ${viewVocales.length} ${t('vocalesWord')}`
        : `<strong>${t('filteredInfo')}</strong> ${fromT} → ${toT}<br>${route.length} ${t('gpsPoints')} · ${stops.length} ${t('stopsWord')} · ${viewVocales.length} ${t('vocalesWord')}`;
    }

    function renderLists() {
      const stops = viewData.stops || [];
      const drives = viewData.drives || [];
      const st = viewData._stats || {};

      $('tab-stops').innerHTML = stops.length ? stops.map((s, i) => {
        const p = isParked(s);
        return `<div class="list-item" data-stop="${i}"><div class="row1">
          <span class="tag ${p ? 'parked' : 'idle'}">${p ? t('parked') : t('idle')}</span>
          <span class="duration">${s.duration}</span></div>
          <div class="times">${s.dt_start}<br>→ ${s.dt_end}</div>
          <div class="coords">${s.lat}, ${s.lng}</div></div>`;
      }).join('') : `<p style="color:var(--muted);font-size:13px">${t('noStops')}</p>`;

      $('tab-drives').innerHTML = drives.length ? drives.map((d, i) =>
        `<div class="list-item" data-drive="${i}"><div class="row1">
          <span class="tag drive">${t('drive')}</span><span class="duration">${d.duration}</span></div>
          <div class="times">${d.dt_start}<br>→ ${d.dt_end}</div>
          <div class="coords">${d.route_length} km · max ${d.top_speed} km/h</div></div>`
      ).join('') : `<p style="color:var(--muted);font-size:13px">${t('noDrives')}</p>`;

      $('tab-vocales').innerHTML = viewVocales.length ? viewVocales.map((v, i) =>
        `<div class="list-item" data-vocal="${i}"><div class="row1">
          <span class="tag vocal">${t('vocal')}</span><span class="duration">${v.durationLabel}</span></div>
          <div class="times">${v.label}</div>
          <div class="coords">${v.gpsTime ? t('carAt') + ' ' + v.gpsTime : t('noGps')}</div>
          <button type="button" class="play-vocal" data-vocal-play="${i}">${t('playRecording')}</button></div>`
      ).join('') : `<p style="color:var(--muted);font-size:13px">${t('noVocales')}</p>`;

      $('tab-summary').innerHTML = `
        <div class="summary-grid">
          <div class="summary-card"><div class="label">${t('lblDistance')}</div><div class="value">${st.distance ?? '—'} km</div></div>
          <div class="summary-card"><div class="label">${t('lblGpsPoints')}</div><div class="value">${(viewData.route||[]).length}</div></div>
          <div class="summary-card"><div class="label">${t('lblTopSpeed')}</div><div class="value">${st.topSpeed ?? '—'} km/h</div></div>
          <div class="summary-card"><div class="label">${t('lblStops')}</div><div class="value">${stops.length}</div></div>
          <div class="summary-card"><div class="label">${t('lblParked')}</div><div class="value">${st.parked ?? 0}</div></div>
          <div class="summary-card"><div class="label">${t('lblStopTime')}</div><div class="value" style="font-size:12px">${formatDuration(st.stopSec||0)}</div></div>
          <div class="summary-card"><div class="label">${t('lblDriveTime')}</div><div class="value" style="font-size:12px">${formatDuration(st.driveSec||0)}</div></div>
          <div class="summary-card"><div class="label">${t('lblVehicle')}</div><div class="value" style="font-size:13px">${viewData.name||'—'}</div></div>
          <div class="summary-card"><div class="label">${t('lblVocales')}</div><div class="value">${viewVocales.length} / ${allVocales.length}</div></div>
        </div>
        <div class="legend">
          <div class="legend-item"><span class="legend-dot" style="background:var(--route)"></span> ${t('legRoute')}</div>
          <div class="legend-item"><span class="legend-dot" style="background:var(--parked)"></span> ${t('legParked')}</div>
          <div class="legend-item"><span class="legend-dot" style="background:var(--idle)"></span> ${t('legIdle')}</div>
          <div class="legend-item"><span class="legend-dot" style="background:var(--vocal)"></span> ${t('legVocal')}</div>
        </div>
        <div class="toggles">
          <label class="toggle-row"><span>${t('toggleRoute')}</span><input type="checkbox" id="toggle-route" ${toggleState.route?'checked':''}></label>
          <label class="toggle-row"><span>${t('toggleStops')}</span><input type="checkbox" id="toggle-stops" ${toggleState.stops?'checked':''}></label>
          <label class="toggle-row"><span>${t('toggleParkedOnly')}</span><input type="checkbox" id="toggle-parked-only" ${toggleState.parkedOnly?'checked':''}></label>
          <label class="toggle-row"><span>${t('toggleDrives')}</span><input type="checkbox" id="toggle-drives" ${toggleState.drives?'checked':''}></label>
          <label class="toggle-row"><span>${t('toggleVocales')}</span><input type="checkbox" id="toggle-vocales" ${toggleState.vocales?'checked':''}></label>
        </div>`;
    }

    function setupTimeline(route) {
      const slider = $('time-slider');
      slider.max = Math.max(0, route.length - 1);
      slider.value = 0;
      currentIndex = 0;
      if (route.length) updatePosition(0, route);
      else { $('time-display').textContent = '—'; $('speed-display').textContent = ''; positionMarker.remove(); }
    }

    function updatePosition(i, route) {
      if (!route?.length) return;
      currentIndex = i;
      const p = route[i];
      positionMarker.setLatLng([+p.lat, +p.lng]);
      if (!layers.position.hasLayer(positionMarker)) positionMarker.addTo(layers.position);
      positionMarker.bindPopup(pointPopup(p));
      $('time-display').textContent = p.dt_tracker;
      $('speed-display').textContent = `${p.speed} km/h · ${t('popupIgnitionShort')} ${p.params?.acc==='1'?t('ignitionOn'):t('ignitionOff')}`;
      $('time-slider').value = i;
    }

    function buildPresets() {
      const min = tripBounds.minMs, max = tripBounds.maxMs, span = max - min;
      const presets = [{ id: 'full', label: t('presetFull'), start: min, end: max }];
      for (let i = 0; i < 4; i++) {
        const s = min + span * i / 4, e = min + span * (i + 1) / 4;
        presets.push({ id: 'q' + i, label: timeToInput(s) + '–' + timeToInput(e), start: s, end: e });
      }
      const noon = new Date(min); noon.setHours(12, 0, 0, 0);
      if (noon.getTime() > min && noon.getTime() < max) {
        presets.push({ id: 'am', label: t('presetMorning'), start: min, end: noon.getTime() });
        presets.push({ id: 'pm', label: t('presetAfternoon'), start: noon.getTime(), end: max });
      }
      $('preset-grid').innerHTML = presets.map(p =>
        `<button class="preset-btn" data-start="${p.start}" data-end="${p.end}">${p.label}</button>`
      ).join('');
    }

    function applyInterval(startMs, endMs) {
      if (startMs > endMs) [startMs, endMs] = [endMs, startMs];
      startMs = Math.max(tripBounds.minMs, startMs);
      endMs = Math.min(tripBounds.maxMs, endMs);
      filterStartMs = startMs; filterEndMs = endMs;
      $('interval-from').value = timeToInput(startMs);
      $('interval-to').value = timeToInput(endMs);
      document.querySelectorAll('.preset-btn').forEach(b => b.classList.toggle('active',
        +b.dataset.start === startMs && +b.dataset.end === endMs));
      viewData = filterData(rawData, startMs, endMs);
      renderMap();
    }

    function bindUIOnce() {
      if (uiBound) return;
      uiBound = true;

      document.querySelector('.panel-tabs').onclick = e => {
        const btn = e.target.closest('button[data-tab]');
        if (!btn) return;
        document.querySelectorAll('.panel-tabs button').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.panel-section').forEach(s => s.classList.remove('active'));
        btn.classList.add('active');
        $('tab-' + btn.dataset.tab).classList.add('active');
      };

      $('preset-grid').onclick = e => {
        const btn = e.target.closest('.preset-btn');
        if (!btn) return;
        applyInterval(+btn.dataset.start, +btn.dataset.end);
      };

      $('apply-interval').onclick = () => {
        const day = new Date(tripBounds.minMs);
        applyInterval(inputToMs($('interval-from').value, day), inputToMs($('interval-to').value, day));
      };

      $('reset-interval').onclick = () => applyInterval(tripBounds.minMs, tripBounds.maxMs);

      $('tab-stops').onclick = e => {
        const el = e.target.closest('[data-stop]');
        if (!el) return;
        const stop = viewData.stops[+el.dataset.stop];
        map.setView([+stop.lat, +stop.lng], 16);
        layers.stops.eachLayer(m => { if (m._stopIndex === +el.dataset.stop) m.openPopup(); });
        closePanelMobile();
      };

      $('tab-drives').onclick = e => {
        const el = e.target.closest('[data-drive]');
        if (!el) return;
        const drive = viewData.drives[+el.dataset.drive];
        const seg = (viewData._fullRoute || []).slice(drive.id_start, (drive.id_end || 0) + 1)
          .filter(p => { const t = parseDate(p.dt_tracker).getTime(); return t >= filterStartMs && t <= filterEndMs; });
        if (seg.length >= 2) map.fitBounds(L.latLngBounds(seg.map(p => [+p.lat, +p.lng])), { padding: [30, 30] });
        closePanelMobile();
      };

      $('tab-vocales').onclick = e => {
        const playBtn = e.target.closest('[data-vocal-play]');
        if (playBtn) {
          e.stopPropagation();
          playVocal(viewVocales[+playBtn.dataset.vocalPlay]);
          return;
        }
        const el = e.target.closest('[data-vocal]');
        if (!el) return;
        const v = viewVocales[+el.dataset.vocal];
        if (v.lat == null) return;
        map.setView([v.lat, v.lng], 16);
        layers.vocales.eachLayer(m => { if (m._vocalIndex === +el.dataset.vocal) m.openPopup(); });
        closePanelMobile();
      };

      $('tab-summary').onchange = e => {
        const id = e.target.id;
        if (id === 'toggle-route') { toggleState.route = e.target.checked; renderMap(); }
        if (id === 'toggle-stops') { toggleState.stops = e.target.checked; renderMap(); }
        if (id === 'toggle-parked-only') { toggleState.parkedOnly = e.target.checked; renderMap(); }
        if (id === 'toggle-drives') { toggleState.drives = e.target.checked; renderMap(); }
        if (id === 'toggle-vocales') { toggleState.vocales = e.target.checked; renderMap(); }
      };

      $('fit-btn').onclick = () => {
        const ll = (viewData.route || []).map(p => [+p.lat, +p.lng]);
        if (ll.length) map.fitBounds(L.latLngBounds(ll), { padding: [40, 40] });
      };

      const panel = $('panel'), overlay = $('panel-overlay');
      $('panel-toggle').onclick = () => {
        panel.classList.toggle('open');
        overlay.classList.toggle('visible', panel.classList.contains('open'));
      };
      overlay.onclick = closePanelMobile;

      $('timeline-toggle').onclick = () => {
        $('timeline-bar').classList.toggle('hidden');
        $('timeline-toggle').classList.toggle('active');
        setTimeout(() => map.invalidateSize(), 300);
      };

      $('time-slider').oninput = () => { pausePlay(); updatePosition(+$('time-slider').value, viewData.route); };
      $('play-btn').onclick = () => {
        if (playTimer) return;
        const route = viewData.route || [];
        playTimer = setInterval(() => {
          if (currentIndex + 1 >= route.length) { pausePlay(); return; }
          updatePosition(currentIndex + 1, route);
          if (currentIndex % 5 === 0) map.panTo([+route[currentIndex].lat, +route[currentIndex].lng], { animate: true, duration: 0.3 });
        }, 120);
      };
      $('pause-btn').onclick = pausePlay;
    }

    function closePanelMobile() {
      if (window.innerWidth <= 768) { $('panel').classList.remove('open'); $('panel-overlay').classList.remove('visible'); }
    }

    function pausePlay() { if (playTimer) { clearInterval(playTimer); playTimer = null; } }

    function startApp(data, vocalManifest) {
      rawData = data;
      const route = data.route || [];
      if (!route.length) { $('err-screen').classList.add('show'); return; }

      allVocales = enrichVocales(vocalManifest, route);

      tripBounds.minMs = parseDate(route[0].dt_tracker).getTime();
      tripBounds.maxMs = parseDate(route[route.length - 1].dt_tracker).getTime();
      filterStartMs = tripBounds.minMs;
      filterEndMs = tripBounds.maxMs;

      $('vehicle-name').textContent = data.name || 'Vehicle';
      $('interval-from').value = timeToInput(tripBounds.minMs);
      $('interval-to').value = timeToInput(tripBounds.maxMs);

      if (!mapReady) initMap();
      bindUIOnce();
      buildPresets();
      viewData = filterData(rawData, filterStartMs, filterEndMs);
      $('map-loading').classList.add('hidden');
      $('app').classList.add('ready');
      renderMap();
    }

    function tryUnlock() {
      const pass = $('gate-pass').value;
      if (pass === PASSWORD) {
        sessionStorage.setItem(AUTH_KEY, '1');
        $('gate-screen').classList.add('hidden');
        loadAppData();
      } else {
        $('gate-error').textContent = t('gateWrong');
      }
    }

    function loadAppData() {
      try {
        const data = window.__TAXI_DATA__;
        const vocals = window.__VOCALES_DATA__ || [];
        if (data && data.route && data.route.length) startApp(data, vocals);
        else $('err-screen').classList.add('show');
      } catch (e) {
        $('err-screen').classList.add('show');
      }
    }

    function initGate() {
      bindLangButtons();
      $('gate-enter').onclick = tryUnlock;
      $('gate-pass').onkeydown = e => { if (e.key === 'Enter') tryUnlock(); };
      if (sessionStorage.getItem(AUTH_KEY) === '1') {
        $('gate-screen').classList.add('hidden');
        loadAppData();
      }
    }

    function boot() {
      initMap();
      initGate();
    }
    boot();
  </script>
</body>
</html>
